<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <th:block th:replace="fragments/layout :: head"></th:block>
    <link rel="stylesheet" th:href="@{/css/login.css}" />
  </head>
  <body>
    <div th:replace="fragments/layout :: navbar"></div>

    <div class="container-md px-3 mt-5 mb-5 pb-5">
      <div class="row justify-content-center align-items-center auth-wrapper">
        <div class="col-md-8 col-lg-6 col-xl-5">
          
          <div class="auth-card p-4 p-md-5">
            <div class="text-center mb-5">
              <div class="brand-icon mb-3" style="font-size: 2.5rem;">
                <i class="bi bi-egg-fried"></i>
              </div>
              <h2 class="auth-title m-0">Welcome back</h2>
              <p class="auth-subtitle mt-2">Log in to save recipes and access Cook Mode.</p>
            </div>

            <div th:if="${param.error}" class="alert alert-danger custom-alert text-center mb-4" role="alert">
              <i class="bi bi-exclamation-circle me-2"></i> Invalid email or password.
            </div>

            <div th:if="${param.logout}" class="alert alert-success custom-alert text-center mb-4" role="alert">
              <i class="bi bi-check-circle me-2"></i> You have been successfully logged out.
            </div>
<div th:if="${param.registered}" class="alert alert-success custom-alert text-center mb-4" role="alert">
              <i class="bi bi-check-circle me-2"></i> Account created! You can now log in.
            </div>
            <form th:action="@{/login}" method="post">
              
              <div class="mb-4">
                <label for="email" class="form-label">Email address</label>
                <input type="email" id="email" name="username" class="form-control custom-input" placeholder="name@example.com" required autofocus />
              </div>

              <div class="mb-4">
                <div class="d-flex justify-content-between align-items-center mb-2">
                  <label for="password" class="form-label m-0">Password</label>
                  <a href="#" class="forgot-link">Forgot password?</a>
                </div>
                <input type="password" id="password" name="password" class="form-control custom-input" placeholder="••••••••" required />
              </div>

              <button type="submit" class="btn w-100 auth-submit-btn py-3 mt-2">
                Sign In
              </button>
            </form>

            <div class="text-center mt-4">
              <p class="text-muted m-0">
                Don't have an account? <a href="/register" class="auth-link">Sign up</a>
              </p>
            </div>
            
          </div>
        </div>
      </div>
    </div>

    <div th:replace="fragments/layout :: mobile-bottom-nav"></div>
    <div th:replace="fragments/layout :: mobile-offcanvas"></div>
  </body>
</html>
