<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
    <link rel="stylesheet" th:href="@{/css/publish.css}" />
  </head>
  <body>
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container-md px-3 mt-4 mb-5 pb-5">
      <div class="row justify-content-center">
        <div class="col-lg-8 col-xl-7">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="m-0 page-title" th:text="${isEdit} ? 'Edit Recipe' : 'Create Recipe'">Create Recipe</h2>
          </div>

          <form class="recipe-form" th:action="${isEdit} ? @{/recipes/{id}(id=${recipeId})} : @{/recipes/publish}" method="post">
            
            <div class="mb-4">
              <label class="form-label">Recipe Title</label>
              <input type="text" name="title" class="form-control custom-input" placeholder="e.g., Spicy Garlic Pasta" th:value="${recipeForm != null ? recipeForm.title : ''}" required />
            </div>

            <div class="mb-4">
              <label class="form-label">Image URL</label>
              <input type="url" name="imageUrl" class="form-control custom-input" placeholder="e.g., https://images.unsplash.com/photo-..." th:value="${recipeForm != null ? recipeForm.imageUrl : ''}" />
              <div class="form-text mt-1 text-muted" style="font-size: 0.8rem; margin-left: 5px;">Paste a direct link to an image. Leave blank to use default.</div>
            </div>

            <div class="mb-4">
              <label class="form-label">Description</label>
              <textarea name="description" class="form-control custom-input" rows="3" placeholder="Briefly describe your recipe..." th:text="${recipeForm != null ? recipeForm.description : ''}" required></textarea>
            </div>

            <div class="row g-3 mb-4">
              <div class="col-sm-6">
                <label class="form-label">Total Time (mins)</label>
                <input type="number" name="prepTimeMins" class="form-control custom-input" placeholder="e.g., 25" th:value="${recipeForm != null ? recipeForm.prepTimeMins : ''}" required />
              </div>
              <div class="col-sm-6">
                <label class="form-label">Base Yield (Servings)</label>
                <input type="number" name="defaultServings" class="form-control custom-input" placeholder="e.g., 2" th:value="${recipeForm != null ? recipeForm.defaultServings : ''}" required />
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label mb-3">Primary Category</label>
              <select name="mealType" class="form-select custom-input mb-4" required>
                  <option value="Breakfast" th:selected="${recipeForm != null and recipeForm.mealType == 'Breakfast'}">Breakfast</option>
                  <option value="Lunch" th:selected="${recipeForm != null and recipeForm.mealType == 'Lunch'}">Lunch</option>
                  <option value="Dinner" th:selected="${recipeForm != null and recipeForm.mealType == 'Dinner'}">Dinner</option>
                  <option value="Snack" th:selected="${recipeForm != null and recipeForm.mealType == 'Snack'}">Snack</option>
                  <option value="Beverage" th:selected="${recipeForm != null and recipeForm.mealType == 'Beverage'}">Beverage</option>
              </select>
            </div>

            <hr class="my-5 opacity-10" />

            <div class="mb-4">
              <label class="form-label section-title mb-4">Ingredients</label>
              
              <div id="ingredientsContainer">
                  
                  <th:block th:if="${isEdit and existingIngredients != null}">
                      <div class="d-flex gap-2 mb-2 align-items-center ingredient-row" th:each="ing : ${existingIngredients}">
                        <input type="number" name="ingredientQuantities" class="form-control custom-input" style="width: 80px;" placeholder="Qty" step="0.1" th:value="${ing.quantityNeeded}" required />
                        <select name="ingredientUnits" class="form-select custom-input" style="width: 100px;">
                          <option value="g" th:selected="${ing.unit == 'g'}">g</option>
                          <option value="ml" th:selected="${ing.unit == 'ml'}">ml</option>
                          <option value="tbsp" th:selected="${ing.unit == 'tbsp'}">tbsp</option>
                          <option value="tsp" th:selected="${ing.unit == 'tsp'}">tsp</option>
                          <option value="cup" th:selected="${ing.unit == 'cup'}">cup</option>
                          <option value="unit" th:selected="${ing.unit == 'unit' or ing.unit == '' or ing.unit == null}">unit</option>
                        </select>
                        <input type="text" name="ingredientNames" class="form-control custom-input flex-grow-1" placeholder="e.g., Unsalted butter" th:value="${ing.ingredient?.name}" required />
                        <i class="bi bi-trash fs-5 text-muted cursor-pointer remove-item-btn" onclick="this.parentElement.remove()"></i>
                      </div>
                  </th:block>

                  <th:block th:if="${!isEdit or existingIngredients == null or #lists.isEmpty(existingIngredients)}">
                      <div class="d-flex gap-2 mb-2 align-items-center ingredient-row">
                        <input type="number" name="ingredientQuantities" class="form-control custom-input" style="width: 80px;" placeholder="Qty" step="0.1" required />
                        <select name="ingredientUnits" class="form-select custom-input" style="width: 100px;">
                          <option value="g">g</option>
                          <option value="ml">ml</option>
                          <option value="tbsp">tbsp</option>
                          <option value="tsp">tsp</option>
                          <option value="cup">cup</option>
                          <option value="unit" selected>unit</option>
                        </select>
                        <input type="text" name="ingredientNames" class="form-control custom-input flex-grow-1" placeholder="e.g., Unsalted butter" required />
                        <i class="bi bi-trash fs-5 text-muted cursor-pointer remove-item-btn" onclick="this.parentElement.remove()"></i>
                      </div>
                  </th:block>

              </div>

              <button type="button" class="add-item-btn mt-2" id="addIngredientBtn">
                <i class="bi bi-plus-lg me-1"></i> Add Another Ingredient
              </button>
            </div>

            <hr class="my-5 opacity-10" />

            <div class="mb-4">
              <label class="form-label section-title mb-4">Instructions</label>
              <p class="text-muted small">Write each step on a new line.</p>
              <textarea name="instructions" class="form-control custom-input" rows="8" placeholder="Step 1: Boil water.&#10;Step 2: Add pasta..." th:text="${recipeForm != null and recipeForm.instructionSteps != null ? #strings.listJoin(recipeForm.instructionSteps, '&#10;') : ''}" required></textarea>
            </div>

            <div class="d-flex justify-content-end align-items-center mt-5 publish-action-group">
              <a th:href="@{/}" class="btn px-3 cancel-btn text-decoration-none">Cancel</a>
              <button type="submit" class="btn publish-submit-btn px-4 py-2" th:text="${isEdit} ? 'Save Changes' : 'Publish Recipe'">
                Publish Recipe
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div th:replace="~{fragments/layout :: mobile-bottom-nav}"></div>
    <div th:replace="~{fragments/layout :: mobile-offcanvas}"></div>

    <script>
        // JS to dynamically add more ingredient rows
        document.getElementById('addIngredientBtn').addEventListener('click', () => {
            const container = document.getElementById('ingredientsContainer');
            const row = document.createElement('div');
            row.className = 'd-flex gap-2 mb-2 align-items-center ingredient-row';
            row.innerHTML = `
                <input type="number" name="ingredientQuantities" class="form-control custom-input" style="width: 80px;" placeholder="Qty" step="0.1" required />
                <select name="ingredientUnits" class="form-select custom-input" style="width: 100px;">
                  <option value="g">g</option>
                  <option value="ml">ml</option>
                  <option value="tbsp">tbsp</option>
                  <option value="tsp">tsp</option>
                  <option value="cup">cup</option>
                  <option value="unit" selected>unit</option>
                </select>
                <input type="text" name="ingredientNames" class="form-control custom-input flex-grow-1" placeholder="Ingredient name" required />
                <i class="bi bi-trash fs-5 text-muted cursor-pointer remove-item-btn" onclick="this.parentElement.remove()"></i>
            `;
            container.appendChild(row);
        });
    </script>
  </body>
</html>
