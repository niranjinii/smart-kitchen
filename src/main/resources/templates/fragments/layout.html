<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
  <head th:fragment="head">
    <meta charset="UTF-8" />
    <title>Smart Kitchen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" th:href="@{/css/global.css}" />
  </head>

  <body>
    <nav th:fragment="navbar" class="navbar navbar-expand-md sticky-top py-3 d-none d-md-flex global-navbar">
      <div class="container-fluid px-4 px-md-5 d-flex justify-content-between align-items-center">
        <a class="navbar-brand m-0 brand-text" href="/">
          <i class="bi bi-egg-fried me-1 brand-icon"></i>SmartKitchen
        </a>

        <div class="d-flex align-items-center gap-4">
          <a href="/" class="nav-icon-link" title="Feed"><i class="bi bi-house-door-fill"></i></a>

          <div class="kitchen-hub-dropdown position-relative">
            <a href="#" class="nav-icon-link d-block" title="My Kitchen"><i class="bi bi-grid"></i></a>
            <div class="hub-menu">
              <a href="/pantry" class="hub-menu-item"><i class="bi bi-archive"></i> Pantry Inventory</a>
              <a href="/shopping-list" class="hub-menu-item"><i class="bi bi-cart2"></i> Shopping List</a>
              <a href="/planner" class="hub-menu-item"><i class="bi bi-calendar-week"></i> Meal Planner</a>
            </div>
          </div>

          <a href="/recipes/new" class="nav-icon-link" title="Publish"><i class="bi bi-plus-square"></i></a>
          
          <a sec:authorize="isAnonymous()" href="/login" class="ms-2 nav-icon-link profile-icon-link">
            <i class="bi bi-person-circle"></i>
          </a>
          
          <div sec:authorize="isAuthenticated()" class="d-flex align-items-center gap-3">
            <div class="dropdown ms-3">
              <a href="#" class="d-flex align-items-center gap-2 text-decoration-none nav-profile-btn" data-bs-toggle="dropdown" aria-expanded="false">
                <img th:src="${#authentication.principal.profileImageUrl}" alt="Profile Avatar" class="nav-profile-avatar" />
                <span class="fw-bold text-dark" style="font-size: 0.95rem;" sec:authentication="principal.displayName"></span>
              </a>
              <div class="dropdown-menu dropdown-menu-end shadow-sm profile-dropdown-menu">
                <div class="px-3 py-2 mb-1">
                  <span class="fw-bold text-dark d-block" style="font-size: 1.05rem;" sec:authentication="principal.displayName"></span>
                </div>
                <a href="/saved" class="dropdown-item hub-menu-item mb-1">
                  <i class="bi bi-bookmark"></i> My Bookmarks
                </a>
                <hr class="dropdown-divider my-1">
                <form th:action="@{/logout}" method="post" class="m-0">
                  <button type="submit" class="dropdown-item hub-menu-item text-danger w-100 text-start bg-transparent border-0" style="transition: all 0.2s ease;">
                    <i class="bi bi-box-arrow-right"></i> Logout
                  </button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <div th:fragment="mobile-bottom-nav" class="mobile-bottom-nav d-md-none">
      <a href="/" class="mobile-nav-item active"><i class="bi bi-house-door-fill"></i></a>
      <a href="#" class="mobile-nav-item" data-bs-toggle="offcanvas" data-bs-target="#mobileKitchenHub"><i class="bi bi-grid"></i></a>
      <a href="/recipes/new" class="mobile-nav-item mobile-publish-btn"><i class="bi bi-plus-lg"></i></a>
      <a href="/planner" class="mobile-nav-item"><i class="bi bi-calendar-week"></i></a>
      <a sec:authorize="isAnonymous()" href="/login" class="mobile-nav-item"><i class="bi bi-person-circle"></i></a>
      <a sec:authorize="isAuthenticated()" href="#" data-bs-toggle="offcanvas" data-bs-target="#mobileProfileMenu" class="mobile-nav-item d-flex align-items-center justify-content-center">
        <img th:src="${#authentication.principal.profileImageUrl}" alt="Profile" class="mobile-profile-avatar" />
      </a>
    </div>

    <th:block th:fragment="mobile-offcanvas">
      
      <div class="offcanvas offcanvas-bottom offcanvas-bottom-custom" tabindex="-1" id="mobileKitchenHub">
        <div class="offcanvas-header pt-4 px-4 pb-1">
          <h5 class="offcanvas-title">My Kitchen</h5>
          <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body px-4 pb-5">
          <div class="list-group list-group-flush">
            <a href="/pantry" class="list-group-item list-group-item-action d-flex align-items-center gap-3 py-3 px-0 offcanvas-link-item">
              <i class="bi bi-archive offcanvas-icon"></i>
              <span class="offcanvas-text">Pantry Inventory</span>
            </a>
            <a href="/shopping-list" class="list-group-item list-group-item-action d-flex align-items-center gap-3 py-3 px-0 offcanvas-link-item">
              <i class="bi bi-cart2 offcanvas-icon"></i>
              <span class="offcanvas-text">Shopping List</span>
            </a>
            <a href="/planner" class="list-group-item list-group-item-action d-flex align-items-center gap-3 py-3 px-0 offcanvas-link-item">
              <i class="bi bi-calendar-week offcanvas-icon"></i>
              <span class="offcanvas-text">Meal Planner</span>
            </a>
          </div>
        </div>
      </div>

      <div sec:authorize="isAuthenticated()" class="offcanvas offcanvas-bottom offcanvas-bottom-custom" tabindex="-1" id="mobileProfileMenu">
        <div class="offcanvas-header pt-4 px-4 pb-1">
          <div class="d-flex align-items-center gap-3">
               <img th:src="${#authentication.principal.profileImageUrl}" alt="Profile" class="offcanvas-profile-avatar" />
               <h4 class="offcanvas-title m-0" sec:authentication="principal.displayName">User Name</h4>
          </div>
          <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body px-4 pb-5">
          <div class="list-group list-group-flush">
            <a href="/saved" class="list-group-item list-group-item-action d-flex align-items-center gap-3 py-3 px-0 offcanvas-link-item">
              <i class="bi bi-bookmark-heart-fill offcanvas-icon text-success"></i>
              <span class="offcanvas-text">My Bookmarks</span>
            </a>
            <form th:action="@{/logout}" method="post" class="m-0 p-0 w-100">
              <button type="submit" class="list-group-item list-group-item-action d-flex align-items-center gap-3 py-3 px-0 offcanvas-link-item text-danger w-100 text-start bg-transparent border-0">
                  <i class="bi bi-box-arrow-right offcanvas-icon text-danger"></i>
                  <span class="offcanvas-text">Logout</span>
              </button>
            </form>
          </div>
        </div>
      </div>

    </th:block>
  </body>
</html>
