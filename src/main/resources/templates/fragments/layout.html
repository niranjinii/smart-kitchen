<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:fragment="head">
    <meta charset="UTF-8" />
    <title>Smart Kitchen</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" th:href="@{/css/global.css}" />
  </head>

  <body>
    <nav
      th:fragment="navbar"
      class="navbar navbar-expand-md sticky-top py-3 d-none d-md-flex global-navbar"
    >
      <div
        class="container-fluid px-4 px-md-5 d-flex justify-content-between align-items-center"
      >
        <a class="navbar-brand m-0 brand-text" href="/">
          <i class="bi bi-egg-fried me-1 brand-icon"></i>SmartKitchen
        </a>

        <div class="d-flex align-items-center gap-4">
          <a href="/" class="nav-icon-link" title="Feed">
            <i class="bi bi-house-door-fill"></i>
          </a>

          <div class="kitchen-hub-dropdown position-relative">
            <a href="#" class="nav-icon-link d-block" title="My Kitchen">
              <i class="bi bi-grid"></i>
            </a>
            <div class="hub-menu">
              <a href="/pantry" class="hub-menu-item"
                ><i class="bi bi-archive"></i> Pantry Inventory</a
              >
              <a href="/shopping-list" class="hub-menu-item"
                ><i class="bi bi-cart2"></i> Shopping List</a
              >
              <a href="/planner" class="hub-menu-item"
                ><i class="bi bi-calendar-week"></i> Meal Planner</a
              >
            </div>
          </div>

          <a href="/recipes/new" class="nav-icon-link" title="Publish">
            <i class="bi bi-plus-square"></i>
          </a>
          <a href="/profile" class="ms-2 nav-icon-link profile-icon-link">
            <i class="bi bi-person-circle"></i>
          </a>
        </div>
      </div>
    </nav>

    <div th:fragment="mobile-bottom-nav" class="mobile-bottom-nav d-md-none">
      <a href="/" class="mobile-nav-item active"
        ><i class="bi bi-house-door-fill"></i
      ></a>
      <a
        href="#"
        class="mobile-nav-item"
        data-bs-toggle="offcanvas"
        data-bs-target="#mobileKitchenHub"
      >
        <i class="bi bi-grid"></i>
      </a>
      <a href="/recipes/new" class="mobile-nav-item mobile-publish-btn"
        ><i class="bi bi-plus-lg"></i
      ></a>
      <a href="/planner" class="mobile-nav-item"
        ><i class="bi bi-calendar-week"></i
      ></a>
      <a href="/profile" class="mobile-nav-item"
        ><i class="bi bi-person-circle"></i
      ></a>
    </div>

    <div
      th:fragment="mobile-offcanvas"
      class="offcanvas offcanvas-bottom"
      tabindex="-1"
      id="mobileKitchenHub"
      style="
        height: auto;
        border-top-left-radius: 24px;
        border-top-right-radius: 24px;
      "
    >
      <div class="offcanvas-header pt-4 px-4 pb-1">
        <h5 class="offcanvas-title">My Kitchen</h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="offcanvas"
        ></button>
      </div>
      <div class="offcanvas-body px-4 pb-5">
        <div class="list-group list-group-flush">
          <a
            href="/pantry"
            class="list-group-item list-group-item-action d-flex align-items-center gap-3 py-3 px-0 offcanvas-link-item"
          >
            <i class="bi bi-archive offcanvas-icon"></i>
            <span class="offcanvas-text">Pantry Inventory</span>
          </a>
          <a
            href="/shopping-list"
            class="list-group-item list-group-item-action d-flex align-items-center gap-3 py-3 px-0 offcanvas-link-item"
          >
            <i class="bi bi-cart2 offcanvas-icon"></i>
            <span class="offcanvas-text">Shopping List</span>
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
