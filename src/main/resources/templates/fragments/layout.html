<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:fragment="head">
    <meta charset="UTF-8" />
    <title>Smart Kitchen</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>

  <body>
    <nav
      th:fragment="navbar"
      class="navbar navbar-expand-lg sticky-top bg-white border-bottom py-3"
    >
      <div class="container-fluid px-4 px-md-5">
        <a
          class="navbar-brand fw-bold fs-4"
          href="/"
          style="letter-spacing: -0.05em"
        >
          <i class="bi bi-egg-fried text-warning me-1"></i>SmartKitchen
        </a>

        <div class="d-none d-lg-flex mx-auto" style="width: 40%">
          <div class="input-group">
            <span
              class="input-group-text bg-light border-0 rounded-start-pill ps-4 text-muted"
            >
              <i class="bi bi-search"></i>
            </span>
            <input
              type="text"
              class="form-control bg-light border-0 rounded-end-pill py-2 shadow-none"
              placeholder="Search recipes, ingredients, or tags..."
            />
          </div>
        </div>

        <div class="d-flex align-items-center gap-4">
          <a href="/" class="text-dark fs-5 nav-icon-link" title="Feed">
            <i class="bi bi-house-door-fill"></i>
          </a>

          <a
            href="/pantry"
            class="text-dark fs-5 nav-icon-link position-relative"
            title="My Kitchen"
          >
            <i class="bi bi-basket3"></i>
            <span
              class="position-absolute top-0 start-100 translate-middle p-1 bg-success border border-light rounded-circle"
            >
              <span class="visually-hidden">New alerts</span>
            </span>
          </a>

          <a
            href="/recipes/new"
            class="text-dark fs-5 nav-icon-link"
            title="Publish"
          >
            <i class="bi bi-plus-square"></i>
          </a>

          <a href="/profile" class="text-dark fs-4 ms-2">
            <i class="bi bi-person-circle"></i>
          </a>
        </div>
      </div>
    </nav>
  </body>
</html>
