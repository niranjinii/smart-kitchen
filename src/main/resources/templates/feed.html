<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="fragments/layout :: head"></th:block>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    
    <div th:replace="fragments/layout :: navbar"></div>

    <div class="container mt-4 mb-5">
        
        <div class="category-filters mb-5">
            <a href="#" class="filter-pill active">All</a>
            
            <a href="#" class="filter-pill" th:each="category : ${categories}" th:text="${category}">Category</a>
        </div>
        
        <div class="masonry-grid">
            
            <a href="#" class="recipe-card" th:each="recipe, stat : ${recipes}" style="text-decoration: none; color: inherit; display: block;">
                
                <div class="img-wrapper">
                    <div class="img-placeholder" 
                         th:classappend="${stat.index % 3 == 0 ? 'height-tall' : (stat.index % 3 == 1 ? 'height-medium' : 'height-short')}"
                         th:style="'background-image: url(' + ${recipe.imageUrl} + ');'">
                    </div>
                    <div class="floating-time-badge">
                        <i class="bi bi-clock"></i> <span th:text="${recipe.prepTimeMins + ' mins'}">15 mins</span>
                    </div>
                </div>

                <div class="recipe-card-header">
                    <h5 class="recipe-title" th:text="${recipe.title}">Recipe Title</h5>
                    <i class="bi bi-bookmark bookmark-btn fs-5"></i>
                </div>
                
                <div class="recipe-meta mt-1" th:text="${recipe.mealType}">Category</div>
            </a>

        </div>
    </div>

</body>
</html>
