<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
    <link rel="stylesheet" th:href="@{/css/feed.css}" />
  </head>
  <body>
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container-md px-3 mt-5 mb-5">
      <div class="row mb-4 justify-content-center">
        <div class="col-md-10 col-lg-8 d-flex gap-2 align-items-center">
          <div class="input-group search-container">
            <span class="input-group-text ps-4 search-icon">
              <i class="bi bi-search"></i>
            </span>
            <input
              type="text"
              class="form-control py-2 search-input"
              placeholder="Search recipes, ingredients, or tags..."
            />
          </div>

          <button
            class="btn px-3 py-2 d-flex align-items-center gap-2 filter-btn"
          >
            <i class="bi bi-funnel"></i> Filter
          </button>
        </div>
      </div>

      <div class="category-filters mb-5">
        <a href="#" class="filter-pill active">All</a>
        <a
          href="#"
          class="filter-pill"
          th:each="category : ${categories}"
          th:text="${category}"
          >Category</a
        >
      </div>

      <div class="masonry-grid">
      
        <a th:href="@{/recipes/{id}(id=${recipe.id})}" class="recipe-card text-decoration-none text-dark" th:each="recipe, stat : ${recipes}">
          <div class="img-wrapper position-relative">
            <div
              class="img-placeholder"
              th:classappend="${stat.index % 3 == 0 ? 'height-tall' : (stat.index % 3 == 1 ? 'height-medium' : 'height-short')}"
              th:style="'background-image: url(' + (${recipe.imageUrl != null ? ((recipe.imageUrl.startsWith('http://') || recipe.imageUrl.startsWith('https://') || recipe.imageUrl.startsWith('/')) ? recipe.imageUrl : '/' + recipe.imageUrl) : 'https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?auto=format&fit=crop&w=1200&q=80'}) + ');'"
            ></div>
            <div class="floating-time-badge position-absolute bottom-0 start-0 m-2 bg-dark text-white px-2 py-1 rounded small">
              <i class="bi bi-clock"></i>
              <span th:text="${recipe.prepTimeMins != null ? recipe.prepTimeMins + ' mins' : '-'}">15 mins</span>
            </div>
          </div>

          <div class="recipe-card-header d-flex justify-content-between align-items-start mt-3 px-1">
            <h5 class="recipe-title fw-bold m-0" th:text="${recipe.title}">Recipe Title</h5>
            
            <i class="bi fs-5 bookmark-btn" 
               th:classappend="${savedRecipeIds != null and #lists.contains(savedRecipeIds, recipe.id)} ? 'bi-bookmark-check-fill text-success' : 'bi-bookmark'"></i>
          </div>

          <div class="recipe-meta text-muted small mt-1 px-1" th:text="${recipe.mealType}">
            Category
          </div>
        </a>
        
      </div>
      </div>
    </div>

    <div th:replace="~{fragments/layout :: mobile-bottom-nav}"></div>
    <div th:replace="~{fragments/layout :: mobile-offcanvas}"></div>
  </body>
</html>
